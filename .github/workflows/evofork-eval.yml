name: EvoFork Eval Gate

on:
  pull_request:
    branches:
      - main

jobs:
  evofork-eval:
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Validate manifest
        run: pnpm evo manifest validate

      - name: Check manifest patch boundary
        run: pnpm evo eval patch-boundary --surface pricing.hero --changed-file apps/demo-nextjs/src/app/pricing/PricingHero.tsx

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Check security policy
        shell: bash
        run: |
          set -euo pipefail
          changed_files="$(git diff --name-only origin/${GITHUB_BASE_REF:-main}...HEAD)"
          db_risk_files="$(printf '%s\n' "$changed_files" | grep -E '(^|/)(database|schema|migration|prisma|drizzle)' || true)"
          disallowed_db_risk_files="$(printf '%s\n' "$db_risk_files" | grep -Ev '^(packages/db/|docs/DATABASE.md$|docs/DATA_MODEL.md$)' || true)"

          if [ -n "$db_risk_files" ] && [ -z "$disallowed_db_risk_files" ]; then
            pnpm evo eval security --allow-risk database_schema
          else
            pnpm evo eval security
          fi

      - name: Write eval report
        run: pnpm evo eval report --surface pricing.hero --changed-file apps/demo-nextjs/src/app/pricing/PricingHero.tsx
