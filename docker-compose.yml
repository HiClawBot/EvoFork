services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: evofork
      POSTGRES_USER: evofork
      POSTGRES_PASSWORD: evofork_local_only
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evofork -d evofork"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - evofork-postgres-data:/var/lib/postgresql/data

volumes:
  evofork-postgres-data:
